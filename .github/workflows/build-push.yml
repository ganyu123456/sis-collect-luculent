name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - '**'

jobs:
  build-amd64:
    name: Build and Push amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: harbor.zkjgy.online/library/sis-collect-luculent:linux-amd64

      - name: Save amd64 image as tar.gz
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker pull harbor.zkjgy.online/library/sis-collect-luculent:linux-amd64
          docker save harbor.zkjgy.online/library/sis-collect-luculent:linux-amd64 \
            | gzip > sis-collect-luculent-amd64.tar.gz

      - name: Upload amd64 artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: sis-collect-luculent-amd64
          path: sis-collect-luculent-amd64.tar.gz

  build-arm64:
    name: Build and Push arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: harbor.zkjgy.online/library/sis-collect-luculent:linux-arm64

      - name: Save arm64 image as tar.gz
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker pull --platform linux/arm64 harbor.zkjgy.online/library/sis-collect-luculent:linux-arm64
          docker save harbor.zkjgy.online/library/sis-collect-luculent:linux-arm64 \
            | gzip > sis-collect-luculent-arm64.tar.gz

      - name: Upload arm64 artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: sis-collect-luculent-arm64
          path: sis-collect-luculent-arm64.tar.gz

  manifest:
    name: Create and Push Manifest
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and Push Manifest
        run: |
          docker buildx imagetools create \
            --tag harbor.zkjgy.online/library/sis-collect-luculent:latest \
            harbor.zkjgy.online/library/sis-collect-luculent:linux-amd64 \
            harbor.zkjgy.online/library/sis-collect-luculent:linux-arm64

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - manifest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sis-collect-luculent-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sis-collect-luculent-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sis-collect-luculent-amd64.tar.gz
            sis-collect-luculent-arm64.tar.gz
